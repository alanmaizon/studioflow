<!doctype html><html><head><meta charset="utf-8"><title>Elevation</title><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div class="label">Elevation on black is signaled by lighter surface tier + inset top hairline + (optional) outer halo. No flat drop shadows.</div>
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);gap:14px;margin-top:6px;">
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:100%;height:80px;background:#1c1c1e;border-radius:var(--sf-radius-lg);box-shadow:var(--sf-elev-1);"></div>
      <span class="label">Elev 1 · cards</span>
    </div>
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:100%;height:80px;background:#1c1c1e;border-radius:var(--sf-radius-lg);box-shadow:var(--sf-elev-2);"></div>
      <span class="label">Elev 2 · popovers</span>
    </div>
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:100%;height:80px;background:rgba(28,28,30,0.78);backdrop-filter:saturate(180%) blur(40px);border-radius:var(--sf-radius-lg);box-shadow:var(--sf-elev-3);"></div>
      <span class="label">Elev 3 · sheets</span>
    </div>
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:100%;height:80px;background:rgba(28,28,30,0.78);backdrop-filter:saturate(180%) blur(60px);border-radius:var(--sf-radius-lg);box-shadow:var(--sf-elev-4);"></div>
      <span class="label">Elev 4 · modals</span>
    </div>
  </div>
</div></body></html>
