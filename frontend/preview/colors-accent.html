<!doctype html><html><head><meta charset="utf-8"><title>Accent</title><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div class="grid" style="grid-template-columns: 1.2fr 1fr 1fr;">
    <div class="col" style="gap:6px;">
      <div class="swatch" style="background:#0A84FF;"></div>
      <div class="label">Accent · macOS Blue</div>
      <div class="mono">#0A84FF</div>
    </div>
    <div class="col" style="gap:6px;">
      <div class="swatch" style="background:rgba(10,132,255,0.18);box-shadow:inset 0 0 0 1px rgba(10,132,255,0.32);"></div>
      <div class="label">Tint · 18%</div>
      <div class="mono" style="color:var(--sf-fg-2)">rgba(10,132,255,.18)</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="height:80px;border-radius:var(--sf-radius-md);background:#000;display:flex;align-items:center;justify-content:center;color:#0A84FF;font:var(--sf-text-body-strong);text-decoration:underline;text-underline-offset:3px;">View 3 traces</div>
      <div class="label">As link / focus ring</div>
    </div>
  </div>
</div></body></html>
