<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_card.css">
<style>
  .field { display:flex; flex-direction:column; gap:6px; }
  .lbl { font:var(--sf-text-micro); letter-spacing:0.06em; text-transform:uppercase; color:var(--sf-fg-3); }
  .input { height:36px; padding:0 12px; background:#1c1c1e; border-radius:10px; color:var(--sf-fg-1); font:var(--sf-text-body); box-shadow:var(--sf-elev-1); border:0; outline:0; }
  .input:focus { box-shadow:var(--sf-elev-1), 0 0 0 2px #000, 0 0 0 4px #0A84FF; }
  .input::placeholder { color:var(--sf-fg-3); }
  .seg { display:inline-flex; padding:3px; background:#1c1c1e; border-radius:10px; box-shadow:var(--sf-elev-1); }
  .seg button { background:transparent; border:0; color:var(--sf-fg-2); font:var(--sf-text-caption-strong); height:26px; padding:0 12px; border-radius:7px; cursor:pointer; }
  .seg button.on { background:#3a3a3c; color:var(--sf-fg-1); box-shadow:inset 0 1px 0 rgba(255,255,255,0.08); }
</style>
</head><body><div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <div class="field"><span class="lbl">Search</span><input class="input" placeholder="Search assets · cmd K"></input></div>
    <div class="field"><span class="lbl">Service</span><input class="input" value="encode" style="font-family:var(--sf-font-mono);"></input></div>
  </div>
  <div class="label" style="margin-top:4px;">Segmented control · pipeline stage filter</div>
  <div class="seg">
    <button>All</button>
    <button class="on">Encoding</button>
    <button>Enriching</button>
    <button>Review</button>
    <button>Published</button>
  </div>
</div></body></html>
