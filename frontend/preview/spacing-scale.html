<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div class="col" style="gap:6px;">
    <div class="label">Spacing · 4px base · 0 / 2 / 4 / 6 / 8 / 12 / 16 / 20 / 24 / 32 / 40 / 48 / 64</div>
  </div>
  <div style="display:flex;align-items:flex-end;gap:14px;">
    <!-- bars -->
    <template id="t"></template>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:2px;background:#0A84FF;border-radius:2px;"></div><span class="mono" style="color:var(--sf-fg-2)">2</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:4px;background:#0A84FF;border-radius:2px;"></div><span class="mono" style="color:var(--sf-fg-2)">4</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:8px;background:#0A84FF;border-radius:2px;"></div><span class="mono" style="color:var(--sf-fg-2)">8</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:12px;background:#0A84FF;border-radius:2px;"></div><span class="mono" style="color:var(--sf-fg-2)">12</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:16px;background:#0A84FF;border-radius:2px;"></div><span class="mono" style="color:var(--sf-fg-2)">16</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:20px;background:#0A84FF;border-radius:2px;"></div><span class="mono" style="color:var(--sf-fg-2)">20</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:24px;background:#0A84FF;border-radius:2px;"></div><span class="mono" style="color:var(--sf-fg-2)">24</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:32px;background:#0A84FF;border-radius:2px;"></div><span class="mono" style="color:var(--sf-fg-2)">32</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:40px;background:#0A84FF;border-radius:2px;"></div><span class="mono" style="color:var(--sf-fg-2)">40</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:48px;background:#0A84FF;border-radius:2px;"></div><span class="mono" style="color:var(--sf-fg-2)">48</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:64px;background:#0A84FF;border-radius:2px;"></div><span class="mono" style="color:var(--sf-fg-2)">64</span></div>
  </div>
</div></body></html>
