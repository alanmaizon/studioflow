<!doctype html><html><head><meta charset="utf-8"><title>Surfaces</title><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="col" style="gap:6px;">
      <div class="swatch" style="background:#000;"></div>
      <div class="label">Background</div>
      <div class="mono">#000000</div>
    </div>
    <div class="col" style="gap:6px;">
      <div class="swatch" style="background:#1c1c1e;"></div>
      <div class="label">Surface</div>
      <div class="mono">#1c1c1e</div>
    </div>
    <div class="col" style="gap:6px;">
      <div class="swatch" style="background:#2c2c2e;"></div>
      <div class="label">Surface · hover</div>
      <div class="mono">#2c2c2e</div>
    </div>
    <div class="col" style="gap:6px;">
      <div class="swatch" style="background:rgba(28,28,30,0.6);backdrop-filter:saturate(180%) blur(20px);"></div>
      <div class="label">Glass</div>
      <div class="mono">rgba(28,28,30,.6) + blur 40</div>
    </div>
  </div>
</div></body></html>
