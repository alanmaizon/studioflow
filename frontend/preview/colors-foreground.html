<!doctype html><html><head><meta charset="utf-8"><title>Foreground</title><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div class="col" style="gap:10px;">
    <div class="row" style="justify-content:space-between;">
      <span style="font:var(--sf-text-h2);letter-spacing:var(--sf-tracking-h2);color:var(--sf-fg-pure);">Primary text · pure white</span>
      <span class="mono">#ffffff</span>
    </div>
    <div class="row" style="justify-content:space-between;">
      <span style="font:var(--sf-text-body);color:var(--sf-fg-1);">Default body · 95% alpha</span>
      <span class="mono">rgba(255,255,255,.95)</span>
    </div>
    <div class="row" style="justify-content:space-between;">
      <span style="font:var(--sf-text-body);color:var(--sf-fg-2);">Secondary · captions, meta · 65%</span>
      <span class="mono" style="color:var(--sf-fg-2);">rgba(255,255,255,.65)</span>
    </div>
    <div class="row" style="justify-content:space-between;">
      <span style="font:var(--sf-text-body);color:var(--sf-fg-3);">Tertiary · placeholders · 42%</span>
      <span class="mono" style="color:var(--sf-fg-3);">rgba(255,255,255,.42)</span>
    </div>
    <div class="row" style="justify-content:space-between;">
      <span style="font:var(--sf-text-body);color:var(--sf-fg-4);">Disabled · dividers · 22%</span>
      <span class="mono" style="color:var(--sf-fg-4);">rgba(255,255,255,.22)</span>
    </div>
  </div>
</div></body></html>
