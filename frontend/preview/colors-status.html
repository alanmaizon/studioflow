<!doctype html><html><head><meta charset="utf-8"><title>Status colors</title><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="col" style="gap:8px;">
      <div class="swatch" style="background:#30D158;"></div>
      <div class="row" style="gap:8px;"><span class="dot" style="background:#30D158;"></span><span class="label" style="color:var(--sf-fg-1)">Published</span></div>
      <div class="mono">#30D158</div>
    </div>
    <div class="col" style="gap:8px;">
      <div class="swatch" style="background:#FF9F0A;"></div>
      <div class="row" style="gap:8px;"><span class="dot" style="background:#FF9F0A;"></span><span class="label" style="color:var(--sf-fg-1)">Encoding</span></div>
      <div class="mono">#FF9F0A</div>
    </div>
    <div class="col" style="gap:8px;">
      <div class="swatch" style="background:#FF453A;"></div>
      <div class="row" style="gap:8px;"><span class="dot" style="background:#FF453A;"></span><span class="label" style="color:var(--sf-fg-1)">Failed</span></div>
      <div class="mono">#FF453A</div>
    </div>
    <div class="col" style="gap:8px;">
      <div class="swatch" style="background:#5E5CE6;"></div>
      <div class="row" style="gap:8px;"><span class="dot" style="background:#5E5CE6;"></span><span class="label" style="color:var(--sf-fg-1)">Agent</span></div>
      <div class="mono">#5E5CE6</div>
    </div>
  </div>
</div></body></html>
