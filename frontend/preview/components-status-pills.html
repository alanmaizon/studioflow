<!doctype html><html><head><meta charset="utf-8"><title>Status pills</title><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div class="row" style="flex-wrap:wrap;gap:10px;">
    <span class="pill" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.10);color:rgba(235,235,245,0.85);"><span class="dot" style="background:rgba(235,235,245,0.6);"></span>Ingested</span>
    <span class="pill" style="background:var(--sf-status-amber-fill);border-color:var(--sf-status-amber-border);color:#FF9F0A;"><span class="dot" style="background:#FF9F0A;"></span>Encoding</span>
    <span class="pill" style="background:var(--sf-status-amber-fill);border-color:var(--sf-status-amber-border);color:#FF9F0A;"><span class="dot" style="background:#FF9F0A;"></span>Enriching</span>
    <span class="pill" style="background:var(--sf-accent-fill);border-color:var(--sf-accent-border);color:#0A84FF;"><span class="dot" style="background:#0A84FF;"></span>Review</span>
    <span class="pill" style="background:var(--sf-status-green-fill);border-color:var(--sf-status-green-border);color:#30D158;"><span class="dot" style="background:#30D158;"></span>Published</span>
    <span class="pill" style="background:var(--sf-status-red-fill);border-color:var(--sf-status-red-border);color:#FF453A;"><span class="dot" style="background:#FF453A;"></span>Failed</span>
    <span class="pill" style="background:var(--sf-status-indigo-fill);border-color:var(--sf-status-indigo-border);color:#5E5CE6;"><span class="dot" style="background:#5E5CE6;"></span>Agent · diagnosing</span>
  </div>
  <div class="meta">Pills use semantic fill (.16), 1px border (.30), uppercase label.</div>
</div></body></html>
