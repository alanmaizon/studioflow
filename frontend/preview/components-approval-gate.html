<!doctype html><html><head><meta charset="utf-8"><title>Approval gate</title><link rel="stylesheet" href="_card.css">
<style>
  .sheet { background:rgba(28,28,30,0.85); backdrop-filter:saturate(180%) blur(60px); border-radius:18px; box-shadow:var(--sf-elev-4); padding:20px; }
  .kbd { font:var(--sf-text-micro); letter-spacing:0.06em; padding:2px 6px; background:rgba(255,255,255,0.06); border-radius:4px; color:var(--sf-fg-2); }
  .act { display:flex; align-items:center; gap:10px; padding:10px 12px; background:rgba(255,255,255,0.04); border-radius:10px; }
  .seq { width:20px; height:20px; border-radius:5px; background:#0A84FF;color:#fff;font:var(--sf-text-micro);display:flex;align-items:center;justify-content:center; flex:0 0 20px;}
  .btn { height:36px; padding:0 16px; border-radius:10px; font:var(--sf-text-body-strong); border:0; cursor:pointer; }
</style>
</head><body><div class="card">
  <div class="sheet">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <span class="dot" style="background:#FF9F0A;box-shadow:0 0 12px #FF9F0A;"></span>
      <span style="font:var(--sf-text-micro);letter-spacing:0.06em;text-transform:uppercase;color:#FF9F0A;">Approval required</span>
      <span class="meta" style="margin-left:auto;">PRB-7281 · 47s ago</span>
    </div>
    <div style="font:var(--sf-text-h2);letter-spacing:-0.005em;color:var(--sf-fg-pure);">You are about to execute 2 actions on the <span style="font-family:var(--sf-font-mono);font-weight:500;">encode</span> service.</div>
    <div style="font:var(--sf-text-caption);color:var(--sf-fg-2);margin-top:6px;">This cannot be undone in one click.</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:14px;">
      <div class="act"><span class="seq">1</span><span style="font:var(--sf-text-body);color:var(--sf-fg-1);">Rollback to commit <span style="font-family:var(--sf-font-mono);color:#0A84FF">abc123</span></span><span class="meta" style="margin-left:auto;">~30s</span></div>
      <div class="act"><span class="seq">2</span><span style="font:var(--sf-text-body);color:var(--sf-fg-1);">Scale memory <span style="font-family:var(--sf-font-mono);color:var(--sf-fg-pure)">1 GiB → 4 GiB</span></span><span class="meta" style="margin-left:auto;">~12s</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:14px;">
      <button class="btn" style="background:#0A84FF;color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,0.18);">Approve · run both</button>
      <button class="btn" style="background:#2c2c2e;color:var(--sf-fg-1);box-shadow:var(--sf-elev-1);">Reject</button>
      <span style="margin-left:auto;color:var(--sf-fg-3);font:var(--sf-text-caption);"><span class="kbd">⌘ ↵</span> approve · <span class="kbd">esc</span> reject</span>
    </div>
  </div>
</div></body></html>
