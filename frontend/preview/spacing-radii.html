<!doctype html><html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_card.css"></head><body><div class="card">
  <div class="grid" style="grid-template-columns: repeat(6, 1fr);gap:12px;">
    <div class="col" style="gap:6px;align-items:center;"><div style="width:64px;height:64px;background:#1c1c1e;box-shadow:var(--sf-elev-1);border-radius:4px;"></div><span class="mono" style="color:var(--sf-fg-2)">4</span><span class="label">xs</span></div>
    <div class="col" style="gap:6px;align-items:center;"><div style="width:64px;height:64px;background:#1c1c1e;box-shadow:var(--sf-elev-1);border-radius:6px;"></div><span class="mono" style="color:var(--sf-fg-2)">6</span><span class="label">sm · chip</span></div>
    <div class="col" style="gap:6px;align-items:center;"><div style="width:64px;height:64px;background:#1c1c1e;box-shadow:var(--sf-elev-1);border-radius:10px;"></div><span class="mono" style="color:var(--sf-fg-2)">10</span><span class="label">md · btn</span></div>
    <div class="col" style="gap:6px;align-items:center;"><div style="width:64px;height:64px;background:#1c1c1e;box-shadow:var(--sf-elev-1);border-radius:14px;"></div><span class="mono" style="color:var(--sf-fg-2)">14</span><span class="label">lg</span></div>
    <div class="col" style="gap:6px;align-items:center;"><div style="width:64px;height:64px;background:#1c1c1e;box-shadow:var(--sf-elev-1);border-radius:18px;"></div><span class="mono" style="color:var(--sf-fg-2)">18</span><span class="label">xl · panel</span></div>
    <div class="col" style="gap:6px;align-items:center;"><div style="width:64px;height:32px;background:#1c1c1e;box-shadow:var(--sf-elev-1);border-radius:999px;"></div><span class="mono" style="color:var(--sf-fg-2)">999</span><span class="label">pill</span></div>
  </div>
</div></body></html>
