<!doctype html><html><head><meta charset="utf-8"><title>Pipeline graph</title><link rel="stylesheet" href="_card.css">
<style>
  .nodes { display:grid; grid-template-columns: repeat(4, 1fr) 18px 1fr; gap:12px; align-items:center; }
  .stage { background:#1c1c1e; border-radius:14px; box-shadow:var(--sf-elev-1); padding:12px; display:flex; flex-direction:column; gap:4px; position:relative; }
  .stage h { font:var(--sf-text-micro); letter-spacing:0.06em; text-transform:uppercase; color:var(--sf-fg-3); }
  .stage v { font:var(--sf-text-h2); letter-spacing:-0.005em; color:var(--sf-fg-pure); font-variant-numeric:tabular-nums; }
  .stage.fail { background:rgba(255,69,58,0.10); box-shadow:inset 0 0 0 1px rgba(255,69,58,0.30); }
  .arr { display:flex; align-items:center; justify-content:center; color:var(--sf-fg-4); }
</style>
</head><body><div class="card">
  <div class="label">Pipeline · last 1h</div>
  <div class="nodes">
    <div class="stage"><h><span class="dot" style="background:#30D158;display:inline-block;margin-right:6px;"></span>Ingest</h><v>128</v><span class="meta">healthy · p99 1.8s</span></div>
    <div class="stage"><h><span class="dot" style="background:#FF9F0A;display:inline-block;margin-right:6px;"></span>Encode</h><v>38</v><span class="meta" style="color:#FF9F0A">degraded · 2 retries</span></div>
    <div class="stage fail"><h><span class="dot" style="background:#FF453A;display:inline-block;margin-right:6px;"></span>Encode · failed</h><v style="color:#FF453A">3</v><span class="meta" style="color:#FF453A">OOM killed</span></div>
    <div class="stage"><h><span class="dot" style="background:#30D158;display:inline-block;margin-right:6px;"></span>Enrich</h><v>34</v><span class="meta">healthy</span></div>
    <div class="arr">→</div>
    <div class="stage"><h><span class="dot" style="background:#30D158;display:inline-block;margin-right:6px;"></span>Publish</h><v>34</v><span class="meta">healthy</span></div>
  </div>
</div></body></html>
