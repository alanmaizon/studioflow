<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>StudioFlow · Studio Control Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: #000; color: rgba(255,255,255,0.95); font: var(--sf-text-body); -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; }
    button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px #000, 0 0 0 4px #0A84FF !important;
    }
    @keyframes sf-fade-in {
      from { opacity: 0.001; }
      to   { opacity: 1; }
    }
    @keyframes sf-sheet-in {
      from { transform: translateY(24px); }
      to   { transform: translateY(0); }
    }
    /* Animations are "decoration" only — never hold an element hidden. */
    /* If anything restarts the animation, fill-mode forwards keeps the */
    /* end state, but base styles also resolve to visible. */
    @keyframes sf-pulse {
      0%   { opacity: 0.45; }
      50%  { opacity: 1;    }
      100% { opacity: 0.45; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition-duration: 0ms !important; }
    }
    ::-webkit-scrollbar          { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb    { background: rgba(255,255,255,0.10); border-radius: 4px; }
    ::-webkit-scrollbar-track    { background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Fixture data -->
  <script src="data.js"></script>

  <!-- Components (order matters — App uses everything else) -->
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="TopBar.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="PipelineSummary.jsx"></script>
  <script type="text/babel" src="AssetTable.jsx"></script>
  <script type="text/babel" src="IncidentCard.jsx"></script>
  <script type="text/babel" src="ToolStream.jsx"></script>
  <script type="text/babel" src="ApprovalGate.jsx"></script>
  <script type="text/babel" src="Inspector.jsx"></script>
  <script type="text/babel" src="Toast.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
